<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Tokenizer</title>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then(result => {
            go.run(result.instance);
        });

        async function tokenizeText() {
            const input = document.getElementById("textInput").value;
            const modelChoice = document.getElementById("modelSelect").value; // Get selected model

            if (typeof tokenizeWeb !== "undefined") {
                const resultJSON = tokenizeWeb(input, modelChoice);

                try {
                    const result = JSON.parse(resultJSON); // Ensure it's a valid JSON object

                    console.log(result);

                    displayResults(result);
                } catch (e) {
                    console.error("Error parsing result:", e);
                    document.getElementById("tokenList").textContent = "Error parsing tokens.";
                    document.getElementById("mergeHistory").textContent = "";
                }
            }
        }

        function displayResults(segmentations) {
            const mergeHistory = document.getElementById("mergeHistory");
            const tabsContainer = document.getElementById("wordTabs");

            mergeHistory.innerHTML = "";
            tabsContainer.innerHTML = "";

            segmentations.forEach((segmentation, wordIndex) => {
                const finalSegmentation = segmentation.Segmentations[segmentation.Segmentations.length - 1];
                const fullWord = finalSegmentation.map(t => t.Token).join("");

                // Create tab for the word
                const tabButton = document.createElement("button");
                tabButton.textContent = fullWord;
                tabButton.classList.add("word-tab");
                tabButton.dataset.wordIndex = wordIndex;
                tabButton.onclick = () => showMergeHistory(wordIndex);

                tabsContainer.appendChild(tabButton);

                // Create merge history container
                const wordContainer = document.createElement("div");
                wordContainer.id = `word-${wordIndex}`;
                wordContainer.classList.add("merge-history");
                if (wordIndex !== 0) wordContainer.style.display = "none"; // Hide all but first

                segmentation.Segmentations.forEach((step, stepIndex) => {
                    const stepDiv = document.createElement("div");
                    stepDiv.innerHTML = `<strong>Step ${stepIndex + 1}:</strong> ${formatTokens(step)}`;
                    wordContainer.appendChild(stepDiv);
                });

                mergeHistory.appendChild(wordContainer);
            });

            // Show first word's history by default
            showMergeHistory(0);
        }

        function showMergeHistory(wordIndex) {
            document.querySelectorAll(".merge-history").forEach(div => {
                div.style.display = "none";
            });
            document.getElementById(`word-${wordIndex}`).style.display = "block";

            // Highlight the selected tab
            document.querySelectorAll(".word-tab").forEach(btn => {
                btn.classList.remove("active");
            });
            document.querySelector(`.word-tab[data-word-index="${wordIndex}"]`).classList.add("active");
        }

        function formatTokens(tokens) {
            return tokens.map(t => `<span class="token">${t.Token} (${t.ID})</span>`).join(", ");
        }
    </script>
    <style>
        .token {
            display: inline-block;
            background: #e1ecf4;
            padding: 2px 5px;
            margin: 2px;
            border-radius: 5px;
            font-family: monospace;
        }
        h3 {
            margin-top: 10px;
        }
        .word-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .word-tab {
            padding: 5px 10px;
            cursor: pointer;
            background: #e1ecf4;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .word-tab.active {
            background: #007bff;
            color: white;
        }

        .merge-history {
            display: none;
        }
    </style>
</head>
<body>
<h1>Tokenizer</h1>

<!-- New input field for user text -->
<label for="textInput">Enter Text:</label>
<input type="text" id="textInput" placeholder="Enter text here" value="foo bar">

<label for="modelSelect">Select Tokenizer:</label>
<select id="modelSelect">
    <option value="m000">m000</option>
    <option value="m010">m010</option>
    <option value="m020">m020</option>
    <option value="m030">m030</option>
    <option value="m040">m040</option>
    <option value="m050">m050</option>
    <option value="m060">m060</option>
    <option value="m070">m070</option>
    <option value="m080">m080</option>
    <option value="m090">m090</option>
    <option value="m100" selected>m100</option>
</select>

<button onclick="tokenizeText()">Tokenize</button>

<div id="wordTabs" class="word-tabs"></div>
<div id="mergeHistory"></div>

</body>
</html>
